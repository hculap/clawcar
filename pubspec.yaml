name: clawcar
description: Voice-first mobile client for OpenClaw AI gateway with CarPlay and Android Auto support.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.0
  flutter: ^3.32.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Networking
  web_socket_channel: ^3.0.3

  # Service discovery
  nsd: ^4.1.0

  # Audio recording & VAD
  record: ^6.2.0
  vad: ^0.0.7+1

  # Audio playback (streaming TTS from gateway)
  just_audio: ^0.10.5

  # Storage
  shared_preferences: ^2.5.0
  path_provider: ^2.1.0

  # Utilities
  uuid: ^4.5.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  cryptography: ^2.7.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.3
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  mockito: ^5.4.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/sounds/
